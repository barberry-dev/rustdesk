name: Build Barberry Remote (Windows)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git pull
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$pwd" >> $env:GITHUB_ENV

      - name: Install vcpkg dependencies
        run: |
          .\vcpkg\vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic --disable-metrics

      - name: Install LLVM
        run: choco install llvm -y

      - name: Set environment variables
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: barberry-remote-windows
          path: target/release/*.exe
          retention-days: 30