name: Build Barberry Remote (Windows)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git pull
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$pwd" >> $env:GITHUB_ENV

      - name: Install vcpkg dependencies
        run: |
          .\vcpkg\vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic --disable-metrics

      - name: Install LLVM
        run: choco install llvm -y

      - name: Set environment variables
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV

      - name: Build Rust bridge
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/generated_bridge.dart

      - name: Build Flutter + Rust (Release)
        run: |
          python3 .\build.py --flutter

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: barberry-remote-windows
          path: flutter\build\windows\x64\runner\Release\*.exe
          retention-days: 30